<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PC Shop</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="site-header">

  <!-- Utility bar -->
  <div class="utility-bar">
    <div class="utility-left">
      <span class="utility-brand">PC&nbsp;Shop</span>
    </div>
    <div class="utility-right">
      <a href="#">Find a Store</a>
      <span class="divider">|</span>
      <a href="#">Help</a>
      <span class="divider">|</span>
      <a href="#">Join Us</a>
      <span class="divider">|</span>
      <a href="#">Sign In</a>
    </div>
  </div>

  <!-- Main nav -->
  <div class="main-bar">
    <a href="#" class="logo">
      <span class="logo-mark">PC</span>
    </a>

    <nav class="main-nav">
      <a href="#">New</a>
      <a href="#">Men</a>
      <a href="#">Women</a>
      <a href="#">Kids</a>
      <a href="#">Sneakers</a>
      <a href="#">Accessories</a>
      <a href="#">Collections</a>
    </nav>

    <div class="main-right">
      <div class="search-bar">
        <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="7"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input type="text" placeholder="Search" id="searchInput">
      </div>

      <button class="icon-btn" id="wishlistBtn" aria-label="Wishlist">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M12 21s-7.5-4.6-10-9C0.3 8.4 1.6 4.5 5.4 3.6 7.9 3 10.4 4.1 12 6.3 13.6 4.1 16.1 3 18.6 3.6c3.8 0.9 5.1 4.8 3.4 8.4-2.5 4.4-10 9-10 9z"/>
        </svg>
      </button>

      <button class="icon-btn" id="bagBtn" aria-label="Bag">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M6 7h12l-1 13H7L6 7z"/>
          <path d="M9 7V5.5a3 3 0 0 1 6 0V7"/>
        </svg>
      </button>
    </div>
  </div>

</header>
<section class="sale-banner">
  <!-- Replace this img src with your own photo -->
  <img src="PC.JPG" alt="ZM Collective end of season sale" class="banner-img">

  <div class="banner-overlay"></div>

  <div class="banner-content">
    <h1>END OF SEASON SALE</h1>
    <p>Shop your end-of-season favourites.<br>Up to 50% off. Ts &amp; Cs apply.</p>

    <div class="cta-group">
      <a href="#" class="cta-btn">
        SHOP DESKTOPS <span class="arrow">→</span>
      </a>
      <a href="#" class="cta-btn">
        SHOP LAPTOPS <span class="arrow">→</span>
      </a>
      <a href="#" class="cta-btn">
        SHOP OTHERS <span class="arrow">→</span>
      </a>
    </div>
  </div>
</section>

<script src="script.js"></script>
</body>
</html>
